# fly.toml app configuration file generated for facebook-monetiser on 2026-03-03T10:58:07+01:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'facebook-monetiser'
primary_region = 'ams'

# Build will use Dockerfile automatically
# Remove [build] section to use Dockerfile deployment

[env]
  DATABASE_PATH = '/data/facebook-monetiser.db'
  NODE_ENV = 'production'
  PORT = '3000'

[processes]
  app = 'node backend/server.js'

[[mounts]]
  source = 'facebook_monetiser_data'
  destination = '/data'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '30s'
    grace_period = '60s'
    method = 'GET'
    path = '/api/health'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
