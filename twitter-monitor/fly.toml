# fly.toml app configuration file generated for twitter-monitor on 2026-03-03T14:56:01+01:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'twitter-monitor'
primary_region = 'ams'

[build]
  dockerfile = 'Dockerfile'

[env]
  DATABASE_URL = 'file:/data/twitter-monitor.db'
  NODE_ENV = 'production'
  PORT = '3000'

[[mounts]]
  source = 'twitter_monitor_data'
  destination = '/data'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    interval = '15s'
    timeout = '5s'
    grace_period = '30s'
    method = 'GET'
    path = '/api/health'

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
